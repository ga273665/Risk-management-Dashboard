<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球原物料 &amp; 債券殖利率 — 風險管理儀表板</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#050a12;min-height:100vh;font-family:'Outfit','Noto Sans TC',sans-serif;color:#b0c4d8}
.mono{font-family:'JetBrains Mono',monospace}
::-webkit-scrollbar{height:5px;width:6px}
::-webkit-scrollbar-track{background:#050a12}
::-webkit-scrollbar-thumb{background:#10202e;border-radius:4px}
@keyframes spin{to{transform:rotate(360deg)}}

#loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#050a12}
#loading .sp{width:44px;height:44px;border:3px solid #1a2e44;border-top:3px solid #4FC3F7;border-radius:50%;animation:spin .8s linear infinite}
#loading .txt{color:#8aa0b8;font-size:15px}
#loading .sub{color:#4a6a8e;font-size:12px;margin-top:-8px}

#dashboard{display:none;max-width:1200px;margin:0 auto;padding:20px 16px}

.hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.hdr h1{font-size:22px;font-weight:800;color:#dce6f0;letter-spacing:-.4px}
.hdr h1 em{color:#4FC3F7;font-style:normal;margin-right:8px}
.hsub{font-size:10px;color:#3a5068;margin-top:4px;letter-spacing:2.5px;font-weight:700}
.hstatus{background:#0a1420;border-radius:10px;padding:5px 12px;font-size:10px;color:#4a6a8e;border:1px solid #14263a;display:inline-flex;align-items:center;gap:7px}
.hdot{width:7px;height:7px;border-radius:50%;display:inline-block}
.hbtn{background:#0e1a28;border:1px solid #1a3050;border-radius:10px;padding:6px 16px;color:#4FC3F7;font-size:12px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif}
.hbtn:hover{border-color:#4FC3F7}

.warn{margin-bottom:14px;background:#eab30810;border:1px solid #eab30825;border-radius:10px;padding:10px 14px;font-size:12px;color:#c4a030;line-height:1.6}

.panel{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin-bottom:14px}
.card{background:linear-gradient(150deg,#0a1620,#071018);border-radius:16px;padding:18px 20px;border:1px solid #12223a}
.clabel{font-size:9px;color:#3a5068;font-weight:700;letter-spacing:2.5px;margin-bottom:8px}

.tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.tab{border-radius:10px;padding:6px 16px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Outfit','Noto Sans TC',sans-serif;border:1px solid #12223a;background:transparent;color:#3a5068;transition:all .2s}
.tab.active{color:#4FC3F7;background:#4FC3F710;border-color:#4FC3F730}

.tw{background:linear-gradient(155deg,#0a1420,#071018);border-radius:16px;border:1px solid #12223a;overflow:hidden}
table{width:100%;border-collapse:collapse;min-width:860px}
thead th{padding:11px 14px;font-size:9px;font-weight:700;color:#3a5068;letter-spacing:2px;text-transform:uppercase;cursor:pointer;user-select:none;white-space:nowrap}
tbody tr{border-bottom:1px solid #0c1824;cursor:pointer;transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#0c1824}
tbody td{padding:10px 14px}

.chip{display:inline-flex;align-items:center;gap:3px;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700}
.chip.up{background:#10b98112;border:1px solid #10b98120;color:#10b981}
.chip.dn{background:#ef444412;border:1px solid #ef444420;color:#ef4444}

.mbg{position:fixed;inset:0;z-index:999;background:rgba(3,6,12,.92);display:flex;align-items:center;justify-content:center;padding:16px}
.mbox{background:linear-gradient(155deg,#0c1822,#081018);border-radius:20px;border:1px solid #1a2e44;max-width:720px;width:100%;padding:28px;position:relative;box-shadow:0 20px 80px rgba(0,0,0,.5)}
.mclose{position:absolute;top:14px;right:18px;background:#0e1a28;border:1px solid #1a2e44;border-radius:8px;width:30px;height:30px;color:#5a7a9e;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mclose:hover{color:#fff;border-color:#4FC3F7}

.ft{margin-top:14px;font-size:10px;color:#2a3e52;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
</style>
</head>
<body>

<div id="loading">
  <div class="sp"></div>
  <div class="txt">正在載入每日收盤數據...</div>
  <div class="sub" id="loadStatus">連線 Twelve Data API 中</div>
</div>

<div id="dashboard"></div>
<div id="modal"></div>

<script>
var API_KEY = "78da63ad2c4f4866b3ab9152cf265616";

var INSTRUMENTS = [
  {id:"gold",sym:"XAU/USD",name:"\u9ec3\u91d1",unit:"USD/oz",icon:"\ud83e\udd47",cat:"metals",bond:false,fb:4670},
  {id:"silver",sym:"XAG/USD",name:"\u767d\u9280",unit:"USD/oz",icon:"\ud83e\udd48",cat:"metals",bond:false,fb:73.3},
  {id:"copper",sym:"XCU/USD",name:"\u9285",unit:"USD/lb",icon:"\ud83d\udd36",cat:"metals",bond:false,fb:4.85},
  {id:"platinum",sym:"XPT/USD",name:"\u9251\u91d1",unit:"USD/oz",icon:"\u2b1c",cat:"metals",bond:false,fb:1020},
  {id:"wti",sym:"WTI/USD",name:"WTI \u539f\u6cb9",unit:"USD/bbl",icon:"\ud83d\udee2\ufe0f",cat:"energy",bond:false,fb:116},
  {id:"brent",sym:"BRN/USD",name:"\u5e03\u862d\u7279\u539f\u6cb9",unit:"USD/bbl",icon:"\ud83d\udee2\ufe0f",cat:"energy",bond:false,fb:115},
  {id:"natgas",sym:"NG/USD",name:"\u5929\u7136\u6c23",unit:"USD/MMBtu",icon:"\ud83d\udd25",cat:"energy",bond:false,fb:2.83},
  {id:"us2y",sym:"US2Y",name:"\u7f8e\u50b5 2Y \u6b96\u5229\u7387",unit:"%",icon:"\ud83d\udcca",cat:"bonds",bond:true,fb:3.95},
  {id:"us10y",sym:"US10Y",name:"\u7f8e\u50b5 10Y \u6b96\u5229\u7387",unit:"%",icon:"\ud83d\udcca",cat:"bonds",bond:true,fb:4.34},
  {id:"us20y",sym:"US20Y",name:"\u7f8e\u50b5 20Y \u6b96\u5229\u7387",unit:"%",icon:"\ud83d\udcca",cat:"bonds",bond:true,fb:4.65},
  {id:"us30y",sym:"US30Y",name:"\u7f8e\u50b5 30Y \u6b96\u5229\u7387",unit:"%",icon:"\ud83d\udcca",cat:"bonds",bond:true,fb:4.58}
];

var CAT_LABEL = {metals:"\u8cb4\u91d1\u5c6c & \u57fa\u672c\u91d1\u5c6c",energy:"\u80fd\u6e90",bonds:"\u7f8e\u570b\u516c\u50b5\u6b96\u5229\u7387"};
var CAT_COL = {metals:"#D4AF37",energy:"#E8553A",bonds:"#4FC3F7"};

var DATA = null;
var API_OK = false;
var CUR_CAT = "all";
var SORT_KEY = null;
var SORT_DIR = "desc";

// ── Fetch with timeout ──
function fetchWithTimeout(url, ms) {
  return Promise.race([
    fetch(url),
    new Promise(function(_, reject) {
      setTimeout(function() { reject(new Error("timeout")); }, ms);
    })
  ]);
}

// ── Sequential fetch to avoid rate limit ──
function delay(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

async function fetchOne(inst) {
  try {
    var url = "https://api.twelvedata.com/time_series?symbol=" + encodeURIComponent(inst.sym) + "&interval=1day&outputsize=31&apikey=" + API_KEY;
    var res = await fetchWithTimeout(url, 10000);
    var json = await res.json();
    if (json.status === "error" || !json.values || json.values.length < 2) return null;
    var vals = json.values.slice().reverse();
    var hist = [];
    for (var i = 0; i < vals.length; i++) {
      hist.push({ d: vals[i].datetime, c: parseFloat(vals[i].close) });
    }
    var last = hist[hist.length - 1].c;
    var prev = hist[hist.length - 2].c;
    var chg = last - prev;
    return { price: last, change: chg, changePct: (chg / prev) * 100, high30: Math.max.apply(null, hist.map(function(x){return x.c})), low30: Math.min.apply(null, hist.map(function(x){return x.c})), history: hist, src: "Twelve Data", date: hist[hist.length - 1].d };
  } catch (e) {
    return null;
  }
}

function makeFallback(inst) {
  var p = inst.fb;
  var h = [];
  var v = p * (1 - 0.03 * Math.random());
  for (var i = 0; i < 30; i++) {
    if (inst.bond) { v += (Math.random() - 0.5) * 0.02; }
    else { v += (Math.random() - 0.5) * p * 0.008; }
    if (v < p * 0.92) v = p * 0.92;
    var dd = new Date(Date.now() - (30 - i) * 86400000);
    h.push({ d: dd.toISOString().slice(0, 10), c: parseFloat(v.toFixed(4)) });
  }
  h.push({ d: new Date().toISOString().slice(0, 10), c: p });
  var closes = h.map(function(x){return x.c});
  return { price: p, change: 0, changePct: 0, high30: Math.max.apply(null, closes), low30: Math.min.apply(null, closes), history: h, src: "\u57fa\u6e96\u50f9 (4/7)", date: "2026-04-07" };
}

async function loadAll() {
  var results = {};
  var loaded = 0;
  // Fetch sequentially with 1s delay to respect rate limit (8/min)
  for (var i = 0; i < INSTRUMENTS.length; i++) {
    var inst = INSTRUMENTS[i];
    var statusEl = document.getElementById("loadStatus");
    if (statusEl) statusEl.textContent = "\u6b63\u5728\u8f09\u5165 " + inst.name + " (" + (i + 1) + "/" + INSTRUMENTS.length + ")";
    var data = await fetchOne(inst);
    if (data) {
      results[inst.id] = data;
      loaded++;
    }
    // Wait 1 second between calls to avoid rate limit
    if (i < INSTRUMENTS.length - 1) await delay(1000);
  }
  // Fill in fallbacks
  for (var j = 0; j < INSTRUMENTS.length; j++) {
    if (!results[INSTRUMENTS[j].id]) {
      results[INSTRUMENTS[j].id] = makeFallback(INSTRUMENTS[j]);
    }
  }
  return results;
}

// ── SVG Charts ──
function sparkSVG(hist, id, w, h) {
  w = w || 200; h = h || 64;
  if (!hist || hist.length < 2) return '<div style="height:' + h + 'px;color:#3a5068;font-size:10px;display:flex;align-items:center;justify-content:center">\u2014</div>';
  var up = hist[hist.length - 1].c >= hist[0].c;
  var col = up ? "#10b981" : "#ef4444";
  var closes = hist.map(function(x){return x.c});
  var min = Math.min.apply(null, closes);
  var max = Math.max.apply(null, closes);
  var range = max - min; if (range === 0) range = 1;
  var pts = "";
  var areaPts = "";
  for (var i = 0; i < hist.length; i++) {
    var x = (i / (hist.length - 1)) * w;
    var y = h - 4 - ((hist[i].c - min) / range) * (h - 8);
    pts += x.toFixed(1) + "," + y.toFixed(1) + " ";
    areaPts += x.toFixed(1) + "," + y.toFixed(1) + " ";
  }
  areaPts += w + "," + h + " 0," + h;
  var lastX = w;
  var lastY = h - 4 - ((hist[hist.length - 1].c - min) / range) * (h - 8);
  return '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" style="display:block;width:100%;height:' + h + 'px">' +
    '<defs><linearGradient id="g' + id + '" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="' + col + '" stop-opacity=".3"/><stop offset="100%" stop-color="' + col + '" stop-opacity=".02"/></linearGradient></defs>' +
    '<polygon points="' + areaPts + '" fill="url(#g' + id + ')"/>' +
    '<polyline points="' + pts + '" fill="none" stroke="' + col + '" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>' +
    '<circle cx="' + lastX + '" cy="' + lastY.toFixed(1) + '" r="3" fill="' + col + '"/>' +
    '</svg>';
}

function bigChartSVG(hist, inst) {
  var w = 640, h = 260;
  if (!hist || hist.length < 2) return "";
  var up = hist[hist.length - 1].c >= hist[0].c;
  var col = up ? "#10b981" : "#ef4444";
  var closes = hist.map(function(x){return x.c});
  var min = Math.min.apply(null, closes);
  var max = Math.max.apply(null, closes);
  var range = max - min; if (range === 0) range = 1;
  var pl = 60, pt = 16, pr = 12, pb = 28;
  var cw = w - pl - pr, ch = h - pt - pb;

  var svg = '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" style="width:100%;height:auto">';
  svg += '<defs><linearGradient id="bg' + inst.id + '" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="' + col + '" stop-opacity=".25"/><stop offset="100%" stop-color="' + col + '" stop-opacity="0"/></linearGradient></defs>';

  // Y gridlines
  for (var i = 0; i <= 4; i++) {
    var val = min + (range / 4) * i;
    var y = pt + ch - ((val - min) / range) * ch;
    svg += '<line x1="' + pl + '" y1="' + y + '" x2="' + (pl + cw) + '" y2="' + y + '" stroke="#0e1e2e"/>';
    svg += '<text x="' + (pl - 6) + '" y="' + (y + 3) + '" text-anchor="end" fill="#3a5068" font-size="10" font-family="\'JetBrains Mono\',monospace">' + val.toFixed(inst.bond ? 3 : (val < 10 ? 2 : 0)) + '</text>';
  }
  // X labels
  var step = Math.max(1, Math.floor(hist.length / 5));
  for (var j = 0; j < hist.length; j += step) {
    var xp = pl + (j / (hist.length - 1)) * cw;
    svg += '<text x="' + xp + '" y="' + (h - 5) + '" text-anchor="middle" fill="#3a5068" font-size="10" font-family="\'JetBrains Mono\',monospace">' + hist[j].d.slice(5) + '</text>';
  }

  var pts = "", areaPts = "";
  for (var k = 0; k < hist.length; k++) {
    var px = pl + (k / (hist.length - 1)) * cw;
    var py = pt + ch - ((hist[k].c - min) / range) * ch;
    pts += px.toFixed(1) + "," + py.toFixed(1) + " ";
    areaPts += px.toFixed(1) + "," + py.toFixed(1) + " ";
  }
  areaPts += (pl + cw) + "," + (pt + ch) + " " + pl + "," + (pt + ch);
  var lx = pl + cw;
  var ly = pt + ch - ((hist[hist.length - 1].c - min) / range) * ch;

  svg += '<polygon points="' + areaPts + '" fill="url(#bg' + inst.id + ')"/>';
  svg += '<polyline points="' + pts + '" fill="none" stroke="' + col + '" stroke-width="2.5" stroke-linejoin="round"/>';
  svg += '<circle cx="' + lx + '" cy="' + ly.toFixed(1) + '" r="4" fill="' + col + '" stroke="#0a1218" stroke-width="2"/>';
  svg += '</svg>';
  return svg;
}

function gaugeSVG(value) {
  var v = Math.max(0, Math.min(100, value));
  var ang = -90 + (v / 100) * 180;
  var c = v < 25 ? "#10b981" : v < 50 ? "#eab308" : v < 75 ? "#f97316" : "#ef4444";
  var t = v < 25 ? "\u4f4e\u98a8\u96aa" : v < 50 ? "\u4e2d\u7b49\u98a8\u96aa" : v < 75 ? "\u504f\u9ad8\u98a8\u96aa" : "\u9ad8\u98a8\u96aa";
  return '<div style="text-align:center">' +
    '<svg width="132" height="80" viewBox="0 0 132 80">' +
    '<path d="M 12 70 A 54 54 0 0 1 120 70" fill="none" stroke="#0e1a28" stroke-width="10" stroke-linecap="round"/>' +
    '<path d="M 12 70 A 54 54 0 0 1 120 70" fill="none" stroke="' + c + '" stroke-width="10" stroke-linecap="round" stroke-dasharray="' + ((v / 100) * 170) + ' 170"/>' +
    '<line x1="66" y1="70" x2="66" y2="22" stroke="' + c + '" stroke-width="2.5" stroke-linecap="round" transform="rotate(' + ang + ',66,70)"/>' +
    '<circle cx="66" cy="70" r="4" fill="' + c + '"/>' +
    '<text x="66" y="62" text-anchor="middle" fill="#d0dce8" font-size="16" font-weight="700" font-family="\'JetBrains Mono\',monospace">' + Math.round(v) + '</text>' +
    '</svg>' +
    '<div style="color:' + c + ';font-size:12px;font-weight:700;letter-spacing:1.5px;margin-top:-2px">' + t + '</div></div>';
}

// ── Format ──
function fmtP(inst, v) { return v.toFixed(inst.bond ? 3 : (v < 10 ? 2 : (v < 200 ? 2 : 0))); }

// ── Render ──
function render() {
  var d = DATA;
  if (!d) return;

  var risk = (function() {
    var sp = (d.us10y ? d.us10y.price : 4.34) - (d.us2y ? d.us2y.price : 3.95);
    var oil = (d.wti ? d.wti.price : 116) > 100 ? 20 : 0;
    var gold = (d.gold ? d.gold.price : 4670) > 4500 ? 12 : 0;
    var oV = Math.abs(d.wti ? d.wti.changePct : 0) + Math.abs(d.brent ? d.brent.changePct : 0);
    var sR = sp < 0 ? 25 : sp < 0.3 ? 12 : 0;
    return Math.min(98, Math.max(10, 20 + sR + oV * 2 + oil + gold));
  })();

  var spread = (d.us10y ? d.us10y.price : 4.34) - (d.us2y ? d.us2y.price : 3.95);
  var dataDate = (d.gold && d.gold.date) ? d.gold.date : "—";
  var dotCol = API_OK ? "#10b981" : "#eab308";

  var list = INSTRUMENTS.filter(function(i) { return CUR_CAT === "all" || i.cat === CUR_CAT; });
  if (SORT_KEY) {
    list = list.slice().sort(function(a, b) {
      var va = SORT_KEY === "name" ? a.name : SORT_KEY === "price" ? (d[a.id] ? d[a.id].price : 0) : (d[a.id] ? d[a.id].changePct : 0);
      var vb = SORT_KEY === "name" ? b.name : SORT_KEY === "price" ? (d[b.id] ? d[b.id].price : 0) : (d[b.id] ? d[b.id].changePct : 0);
      if (typeof va === "string") return SORT_DIR === "asc" ? va.localeCompare(vb) : vb.localeCompare(va);
      return SORT_DIR === "asc" ? va - vb : vb - va;
    });
  }

  var sortArrow = function(k) { return SORT_KEY === k ? ' <span style="color:#4FC3F7">' + (SORT_DIR === "asc" ? "\u2191" : "\u2193") + '</span>' : ''; };

  // Key indicators
  var keys = [{l:"\u9ec3\u91d1",id:"gold",p:"$",s:"",dc:0},{l:"WTI\u539f\u6cb9",id:"wti",p:"$",s:"",dc:0},{l:"10Y\u6b96\u5229\u7387",id:"us10y",p:"",s:"%",dc:3}];
  var keyHTML = "";
  for (var ki = 0; ki < keys.length; ki++) {
    var kk = keys[ki]; var kd = d[kk.id]; if (!kd) continue;
    var ku = kd.changePct >= 0;
    keyHTML += '<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:#4a6a8e">' + kk.l + '</span><div style="display:flex;align-items:center;gap:8px"><span class="mono" style="font-size:14px;font-weight:700;color:#d0dce8">' + kk.p + kd.price.toFixed(kk.dc) + kk.s + '</span><span class="mono" style="font-size:11px;font-weight:600;color:' + (ku ? "#10b981" : "#ef4444") + ';min-width:56px;text-align:right">' + (ku ? "\u25b2" : "\u25bc") + Math.abs(kd.changePct).toFixed(2) + '%</span></div></div>';
  }

  // Tabs
  var cats = ["all", "metals", "energy", "bonds"];
  var catNames = {all:"\u5168\u90e8",metals:CAT_LABEL.metals,energy:CAT_LABEL.energy,bonds:CAT_LABEL.bonds};
  var tabsHTML = "";
  for (var ti = 0; ti < cats.length; ti++) {
    var cc = cats[ti];
    tabsHTML += '<button class="tab' + (CUR_CAT === cc ? " active" : "") + '" onclick="setCat(\'' + cc + '\')">' + catNames[cc] + '</button>';
  }

  // Table rows
  var rowsHTML = "";
  for (var ri = 0; ri < list.length; ri++) {
    var inst = list[ri]; var dd = d[inst.id]; if (!dd) continue;
    var up = dd.changePct >= 0;
    var catC = CAT_COL[inst.cat];
    rowsHTML += '<tr onclick="openDetail(\'' + inst.id + '\')">' +
      '<td><div style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">' + inst.icon + '</span><div><div style="font-size:13px;font-weight:700;color:#c8d8e8">' + inst.name + '</div><div style="font-size:10px;color:' + catC + ';font-weight:500;opacity:.7">' + inst.sym + ' \u00b7 ' + inst.unit + '</div></div></div></td>' +
      '<td class="mono" style="text-align:right;font-size:15px;font-weight:700;color:#dce6f0">' + (inst.bond ? "" : "$") + fmtP(inst, dd.price) + (inst.bond ? '<span style="font-size:11px;color:#3a5068">%</span>' : '') + '</td>' +
      '<td style="text-align:right"><span class="mono chip ' + (up ? "up" : "dn") + '">' + (up ? "\u25b2" : "\u25bc") + ' ' + Math.abs(dd.changePct).toFixed(2) + '%</span><div class="mono" style="font-size:10px;color:' + (up ? "#10b98166" : "#ef444466") + ';margin-top:3px">' + (up ? "+" : "") + dd.change.toFixed(inst.bond ? 3 : 2) + '</div></td>' +
      '<td class="mono" style="text-align:right;font-size:11px"><span style="color:#10b981">' + fmtP(inst, dd.high30) + '</span><span style="margin:0 5px;color:#1a2a3a">\u2014</span><span style="color:#ef4444">' + fmtP(inst, dd.low30) + '</span></td>' +
      '<td style="padding:6px 10px;width:230px">' + sparkSVG(dd.history, inst.id) + '</td>' +
      '</tr>';
  }

  var spreadCol = spread < 0 ? "#ef4444" : spread < 0.3 ? "#eab308" : "#10b981";
  var spreadTxt = spread < 0 ? "\u26a0\ufe0f \u6b96\u5229\u7387\u66f2\u7dda\u5012\u639b \u2014 \u8870\u9000\u98a8\u96aa\u5347\u9ad8" : spread < 0.3 ? "\u26a1 \u5229\u5dee\u504f\u7a84 \u2014 \u9700\u5bc6\u5207\u95dc\u6ce8" : "\u2713 \u66f2\u7dda\u6b63\u5e38 \u2014 \u5229\u5dee\u5065\u5eb7";

  document.getElementById("loading").style.display = "none";
  var db = document.getElementById("dashboard");
  db.style.display = "block";
  db.innerHTML =
    '<div class="hdr"><div><h1><em>\u25c8</em>\u5168\u7403\u539f\u7269\u6599 &amp; \u50b5\u5238\u6b96\u5229\u7387</h1><div class="hsub">DAILY RISK DASHBOARD \u00b7 LONG-TERM INVESTOR EDITION</div></div><div style="display:flex;align-items:center;gap:8px"><div class="hstatus mono"><span class="hdot" style="background:' + dotCol + ';box-shadow:0 0 10px ' + dotCol + '44"></span>\u6536\u76e4\u65e5\uff1a' + dataDate + '</div><button class="hbtn" onclick="doRefresh()">\u27f3 \u66f4\u65b0\u6578\u64da</button></div></div>' +
    (!API_OK ? '<div class="warn">\u26a0\ufe0f API \u9023\u7dda\u5931\u6557\uff0c\u986f\u793a 4/7 \u57fa\u6e96\u50f9\u3002\u8acb\u78ba\u8a8d API Key \u6216\u7db2\u8def\u9023\u7dda\u3002</div>' : '') +
    '<div class="panel">' +
      '<div class="card"><div class="clabel">COMPOSITE RISK INDEX</div>' + gaugeSVG(risk) + '</div>' +
      '<div class="card" style="display:flex;flex-direction:column;justify-content:center;gap:10px"><div class="clabel">YIELD SPREAD \u00b7 10Y \u2212 2Y</div><div class="mono" style="font-size:34px;font-weight:800;color:' + spreadCol + ';line-height:1">' + (spread >= 0 ? "+" : "") + spread.toFixed(3) + '<span style="font-size:14px;opacity:.5">%</span></div><div style="font-size:11px;color:#4a6a8e">' + spreadTxt + '</div></div>' +
      '<div class="card" style="display:flex;flex-direction:column;justify-content:center;gap:7px"><div class="clabel">KEY INDICATORS</div>' + keyHTML + '</div>' +
    '</div>' +
    '<div class="tabs">' + tabsHTML + '</div>' +
    '<div class="tw"><div style="overflow-x:auto"><table><thead><tr>' +
      '<th style="text-align:left" onclick="doSort(\'name\')">\u5546\u54c1' + sortArrow("name") + '</th>' +
      '<th style="text-align:right" onclick="doSort(\'price\')">\u6536\u76e4\u50f9' + sortArrow("price") + '</th>' +
      '<th style="text-align:right" onclick="doSort(\'changePct\')">\u65e5\u6f32\u8dcc' + sortArrow("changePct") + '</th>' +
      '<th style="text-align:right">30\u65e5\u5340\u9593</th>' +
      '<th style="text-align:center;width:240px">30 \u65e5\u8d70\u52e2</th>' +
    '</tr></thead><tbody>' + rowsHTML + '</tbody></table></div></div>' +
    '<div class="ft"><span>' + (API_OK ? "\u6578\u64da\u6e90\uff1aTwelve Data API \u6bcf\u65e5\u6536\u76e4\u50f9" : "\u6578\u64da\u6e90\uff1a2026/4/7 \u9a57\u8b49\u57fa\u6e96\u50f9") + ' \u00b7 \u9ede\u64ca\u4efb\u4e00\u5217\u5c55\u958b 30 \u65e5\u5716\u8868</span><span>\u6bcf\u65e5\u958b\u555f\u6642\u81ea\u52d5\u8f09\u5165</span></div>';
}

// ── Interactions ──
function setCat(c) { CUR_CAT = c; SORT_KEY = null; render(); }
function doSort(k) { if (SORT_KEY === k) { SORT_DIR = SORT_DIR === "asc" ? "desc" : "asc"; } else { SORT_KEY = k; SORT_DIR = "desc"; } render(); }

async function doRefresh() {
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("loading").style.display = "flex";
  document.getElementById("loadStatus").textContent = "\u91cd\u65b0\u8f09\u5165\u4e2d...";
  DATA = await loadAll();
  API_OK = false;
  for (var k in DATA) { if (DATA[k].src === "Twelve Data") { API_OK = true; break; } }
  render();
}

function openDetail(id) {
  var inst = null;
  for (var i = 0; i < INSTRUMENTS.length; i++) { if (INSTRUMENTS[i].id === id) { inst = INSTRUMENTS[i]; break; } }
  var dd = DATA[id];
  if (!inst || !dd) return;
  var up = dd.changePct >= 0;
  var col = up ? "#10b981" : "#ef4444";
  document.getElementById("modal").innerHTML =
    '<div class="mbg" onclick="closeDetail()"><div class="mbox" onclick="event.stopPropagation()">' +
    '<button class="mclose" onclick="closeDetail()">\u2715</button>' +
    '<div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;flex-wrap:wrap"><span style="font-size:36px">' + inst.icon + '</span><div><div style="font-size:22px;font-weight:700;color:#e4ecf4">' + inst.name + '</div><div style="font-size:12px;color:' + CAT_COL[inst.cat] + ';font-weight:500">' + inst.sym + ' \u00b7 ' + inst.unit + ' \u00b7 <span style="color:#4a6a8e">' + dd.src + '</span> \u00b7 <span style="color:#3a5068">' + dd.date + '</span></div></div><div style="margin-left:auto;text-align:right"><div class="mono" style="font-size:28px;font-weight:700;color:#e4ecf4">' + (inst.bond ? "" : "$") + fmtP(inst, dd.price) + (inst.bond ? '<span style="font-size:15px;opacity:.6">%</span>' : "") + '</div><div class="mono" style="font-size:15px;font-weight:600;color:' + col + '">' + (up ? "\u25b2" : "\u25bc") + ' ' + Math.abs(dd.changePct).toFixed(2) + '% <span style="font-size:12px;opacity:.6">(' + (up ? "+" : "") + dd.change.toFixed(inst.bond ? 3 : 2) + ')</span></div></div></div>' +
    '<div style="margin-bottom:20px">' + bigChartSVG(dd.history, inst) + '</div>' +
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;border-top:1px solid #1a2a3a;padding-top:16px">' +
    '<div style="text-align:center"><div style="font-size:10px;color:#4a6a8e;font-weight:600;letter-spacing:1px;margin-bottom:4px">30\u65e5\u6700\u9ad8</div><div class="mono" style="font-size:16px;font-weight:700;color:#10b981">' + fmtP(inst, dd.high30) + '</div></div>' +
    '<div style="text-align:center"><div style="font-size:10px;color:#4a6a8e;font-weight:600;letter-spacing:1px;margin-bottom:4px">30\u65e5\u6700\u4f4e</div><div class="mono" style="font-size:16px;font-weight:700;color:#ef4444">' + fmtP(inst, dd.low30) + '</div></div>' +
    '<div style="text-align:center"><div style="font-size:10px;color:#4a6a8e;font-weight:600;letter-spacing:1px;margin-bottom:4px">30\u65e5\u632f\u5e45</div><div class="mono" style="font-size:16px;font-weight:700;color:#eab308">' + ((dd.high30 - dd.low30) / dd.low30 * 100).toFixed(2) + '%</div></div>' +
    '</div></div></div>';
}

function closeDetail() { document.getElementById("modal").innerHTML = ""; }

// ── INIT ──
(async function() {
  try {
    DATA = await loadAll();
    API_OK = false;
    for (var k in DATA) { if (DATA[k].src === "Twelve Data") { API_OK = true; break; } }
  } catch (e) {
    // If everything fails, use fallback data
    DATA = {};
    for (var i = 0; i < INSTRUMENTS.length; i++) {
      DATA[INSTRUMENTS[i].id] = makeFallback(INSTRUMENTS[i]);
    }
    API_OK = false;
  }
  render();
})();
</script>
</body>
</html>
