<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>全球原物料 & 債券殖利率 — 風險管理儀表板</title>
  <meta name="description" content="追蹤黃金、白銀、原油、天然氣與美債殖利率，每日收盤數據，長期投資者風險管理工具。"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(172deg,#040810 0%,#06101a 30%,#081420 100%); min-height: 100vh; font-family: 'Outfit','Noto Sans TC',sans-serif; color: #b0c4d8; }
    ::-webkit-scrollbar { height: 5px; width: 6px; }
    ::-webkit-scrollbar-track { background: #040810; }
    ::-webkit-scrollbar-thumb { background: #10202e; border-radius: 4px; }
    a:hover { opacity: .8; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .row-hover:hover { background: #081420 !important; }
    code { font-family: 'JetBrains Mono', monospace; font-size: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + ReactDOM (production) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <!-- Recharts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <!-- Babel for JSX -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;
    const { AreaChart, Area, ResponsiveContainer, Tooltip, YAxis, XAxis } = Recharts;

    /*
      ═══════════════════════════════════════════════════
       Twelve Data API Key
       免費申請：https://twelvedata.com
      ═══════════════════════════════════════════════════
    */
    const API_KEY = "78da63ad2c4f4866b3ab9152cf265616";

    const INSTRUMENTS = [
      { id:"gold",     sym:"XAU/USD", name:"黃金",            unit:"USD/oz",    icon:"🥇", cat:"metals", bond:false, fallback:4670  },
      { id:"silver",   sym:"XAG/USD", name:"白銀",            unit:"USD/oz",    icon:"🥈", cat:"metals", bond:false, fallback:73.3  },
      { id:"copper",   sym:"XCU/USD", name:"銅",              unit:"USD/lb",    icon:"🔶", cat:"metals", bond:false, fallback:4.85  },
      { id:"platinum", sym:"XPT/USD", name:"鉑金",            unit:"USD/oz",    icon:"⬜", cat:"metals", bond:false, fallback:1020  },
      { id:"wti",      sym:"WTI/USD", name:"WTI 原油",        unit:"USD/bbl",   icon:"🛢️", cat:"energy", bond:false, fallback:116   },
      { id:"brent",    sym:"BRN/USD", name:"布蘭特原油",      unit:"USD/bbl",   icon:"🛢️", cat:"energy", bond:false, fallback:115   },
      { id:"natgas",   sym:"NG/USD",  name:"天然氣",          unit:"USD/MMBtu", icon:"🔥", cat:"energy", bond:false, fallback:2.83  },
      { id:"us2y",     sym:"US2Y",    name:"美債 2Y 殖利率",  unit:"%",         icon:"📊", cat:"bonds",  bond:true,  fallback:3.95  },
      { id:"us10y",    sym:"US10Y",   name:"美債 10Y 殖利率", unit:"%",         icon:"📊", cat:"bonds",  bond:true,  fallback:4.34  },
      { id:"us20y",    sym:"US20Y",   name:"美債 20Y 殖利率", unit:"%",         icon:"📊", cat:"bonds",  bond:true,  fallback:4.65  },
      { id:"us30y",    sym:"US30Y",   name:"美債 30Y 殖利率", unit:"%",         icon:"📊", cat:"bonds",  bond:true,  fallback:4.58  },
    ];

    const CAT_LABEL = { metals:"貴金屬 & 基本金屬", energy:"能源", bonds:"美國公債殖利率" };
    const CAT_COL = { metals:"#D4AF37", energy:"#E8553A", bonds:"#4FC3F7" };

    // ── Twelve Data fetch ──
    async function fetchTimeSeries(sym) {
      const url = `https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(sym)}&interval=1day&outputsize=31&apikey=${API_KEY}`;
      const res = await fetch(url);
      const json = await res.json();
      if (json.status === "error" || !json.values || json.values.length < 2) return null;
      return json.values.slice().reverse();
    }

    function parseResult(inst, values) {
      const hist = values.map(v => ({ date: v.datetime, close: parseFloat(v.close) }));
      const latest = hist[hist.length - 1].close;
      const prev = hist[hist.length - 2].close;
      const chg = latest - prev;
      return {
        price: latest, change: chg, changePct: (chg / prev) * 100,
        high30: Math.max(...hist.map(h => h.close)),
        low30: Math.min(...hist.map(h => h.close)),
        history: hist, src: "Twelve Data", date: hist[hist.length - 1].date,
      };
    }

    function fallbackData(inst) {
      const p = inst.fallback;
      const h = [];
      let v = p * (1 - 0.03 * Math.random());
      for (let i = 0; i < 30; i++) {
        v += (inst.bond ? (Math.random()-.5)*.02 : (Math.random()-.5)*p*.008);
        v = Math.max(v, p * 0.92);
        h.push({ date: new Date(Date.now()-(30-i)*864e5).toISOString().slice(0,10), close:+v.toFixed(4) });
      }
      h.push({ date: new Date().toISOString().slice(0,10), close: p });
      return { price:p, change:0, changePct:0, high30:Math.max(...h.map(x=>x.close)), low30:Math.min(...h.map(x=>x.close)), history:h, src:"基準價 (4/7)", date:"2026-04-07" };
    }

    async function loadAll() {
      const results = {};
      const settled = await Promise.allSettled(
        INSTRUMENTS.map(async inst => {
          try {
            const vals = await fetchTimeSeries(inst.sym);
            if (vals) return { id: inst.id, data: parseResult(inst, vals) };
          } catch {}
          return { id: inst.id, data: null };
        })
      );
      settled.forEach(s => {
        if (s.status === "fulfilled" && s.value.data) results[s.value.id] = s.value.data;
      });
      INSTRUMENTS.forEach(inst => {
        if (!results[inst.id]) results[inst.id] = fallbackData(inst);
      });
      return results;
    }

    // ── Spark ──
    function Spark({ data, id, h = 72 }) {
      if (!data || data.length < 2) return <div style={{ height:h, display:"flex", alignItems:"center", justifyContent:"center", color:"#2a3e52", fontSize:10 }}>—</div>;
      const up = data[data.length-1].close >= data[0].close;
      const c = up ? "#10b981" : "#ef4444";
      return (
        <ResponsiveContainer width="100%" height={h}>
          <AreaChart data={data} margin={{ top:4, right:2, bottom:0, left:2 }}>
            <defs><linearGradient id={`sg-${id}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={c} stopOpacity={.3}/><stop offset="95%" stopColor={c} stopOpacity={.02}/></linearGradient></defs>
            <YAxis hide domain={["dataMin","dataMax"]}/>
            <Tooltip contentStyle={{ background:"#0a1218", border:"1px solid #1c3048", borderRadius:10, fontSize:11, padding:"8px 12px", boxShadow:"0 12px 40px rgba(0,0,0,.5)" }}
              labelStyle={{ color:"#4a7098", fontSize:10 }} itemStyle={{ color:"#d0dce8", fontFamily:"'JetBrains Mono',monospace", fontSize:12 }}
              formatter={v => [typeof v==="number" ? v.toFixed(v<10?3:2) : "—", "收盤"]} cursor={{ stroke:"#4FC3F744" }}/>
            <Area type="monotone" dataKey="close" stroke={c} strokeWidth={2} fill={`url(#sg-${id})`} dot={false} activeDot={{ r:3.5, fill:c, stroke:"#0a1218", strokeWidth:2 }}/>
          </AreaChart>
        </ResponsiveContainer>
      );
    }

    // ── Detail Modal ──
    function Detail({ inst, d, onClose }) {
      if (!inst||!d) return null;
      const up = d.changePct>=0, c = up?"#10b981":"#ef4444";
      const fmtV = v => v.toFixed(inst.bond?3:(v<10?2:(v<200?2:0)));
      return (
        <div style={{ position:"fixed", inset:0, zIndex:1000, background:"rgba(4,8,14,.9)", backdropFilter:"blur(20px)", display:"flex", alignItems:"center", justifyContent:"center", padding:16 }} onClick={onClose}>
          <div style={{ background:"linear-gradient(155deg,#0c1620,#081018)", borderRadius:20, border:"1px solid #1a2e44", maxWidth:740, width:"100%", padding:"28px 32px", position:"relative", boxShadow:"0 32px 100px rgba(0,0,0,.6)" }} onClick={e=>e.stopPropagation()}>
            <button onClick={onClose} style={{ position:"absolute", top:16, right:20, background:"#0e1a28", border:"1px solid #1a2e44", borderRadius:8, width:32, height:32, color:"#4a6a8e", fontSize:16, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
            <div style={{ display:"flex", alignItems:"center", gap:16, marginBottom:24, flexWrap:"wrap" }}>
              <span style={{ fontSize:36 }}>{inst.icon}</span>
              <div>
                <div style={{ fontSize:22, fontWeight:700, color:"#e4ecf4" }}>{inst.name}</div>
                <div style={{ fontSize:12, color:CAT_COL[inst.cat], fontWeight:500 }}>{inst.sym} · {inst.unit} · <span style={{ color:"#3e5672" }}>{d.src}</span> · <span style={{ color:"#2e4458" }}>{d.date}</span></div>
              </div>
              <div style={{ marginLeft:"auto", textAlign:"right" }}>
                <div className="mono" style={{ fontSize:28, fontWeight:700, color:"#e4ecf4" }}>{inst.bond?"":"$"}{fmtV(d.price)}{inst.bond?<span style={{ fontSize:15, opacity:.6 }}>%</span>:""}</div>
                <div className="mono" style={{ fontSize:15, fontWeight:600, color:c }}>{up?"▲":"▼"} {Math.abs(d.changePct).toFixed(2)}% <span style={{ fontSize:12, opacity:.6 }}>({up?"+":""}{d.change.toFixed(inst.bond?3:2)})</span></div>
              </div>
            </div>
            <div style={{ height:300, marginBottom:20 }}>
              <ResponsiveContainer width="100%" height="100%">
                <AreaChart data={d.history} margin={{ top:10, right:12, bottom:8, left:12 }}>
                  <defs><linearGradient id="mGr" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={c} stopOpacity={.28}/><stop offset="100%" stopColor={c} stopOpacity={0}/></linearGradient></defs>
                  <XAxis dataKey="date" tick={{ fontSize:10, fill:"#2e4458" }} tickLine={false} axisLine={{ stroke:"#14223a" }} interval={4} tickFormatter={v=>v?v.slice(5):""}/>
                  <YAxis domain={["auto","auto"]} tick={{ fontSize:10, fill:"#2e4458" }} tickLine={false} axisLine={false} width={65}/>
                  <Tooltip contentStyle={{ background:"#0a1218", border:"1px solid #1c3048", borderRadius:10, fontSize:12, boxShadow:"0 12px 40px rgba(0,0,0,.5)" }} labelStyle={{ color:"#4a7098", fontSize:11 }} formatter={v=>[typeof v==="number"?v.toFixed(inst.bond?3:2):"—","收盤價"]}/>
                  <Area type="monotone" dataKey="close" stroke={c} strokeWidth={2.5} fill="url(#mGr)" dot={false} activeDot={{ r:5, fill:c, stroke:"#0a1218", strokeWidth:2.5 }}/>
                </AreaChart>
              </ResponsiveContainer>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, borderTop:"1px solid #14223a", paddingTop:16 }}>
              {[{ l:"30日最高", v:fmtV(d.high30), c:"#10b981" },{ l:"30日最低", v:fmtV(d.low30), c:"#ef4444" },{ l:"30日振幅", v:((d.high30-d.low30)/d.low30*100).toFixed(2)+"%", c:"#eab308" }].map(x=>(
                <div key={x.l} style={{ textAlign:"center" }}><div style={{ fontSize:10, color:"#2e4458", fontWeight:600, letterSpacing:1, marginBottom:4 }}>{x.l}</div><div className="mono" style={{ fontSize:16, fontWeight:700, color:x.c }}>{x.v}</div></div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ── Gauge ──
    function Gauge({ value }) {
      const v=Math.max(0,Math.min(100,value)), ang=-90+(v/100)*180;
      const c=v<25?"#10b981":v<50?"#eab308":v<75?"#f97316":"#ef4444";
      const t=v<25?"低風險":v<50?"中等風險":v<75?"偏高風險":"高風險";
      return (<div style={{ textAlign:"center" }}>
        <svg width="132" height="80" viewBox="0 0 132 80">
          <path d="M 12 70 A 54 54 0 0 1 120 70" fill="none" stroke="#0c1a28" strokeWidth="10" strokeLinecap="round"/>
          <path d="M 12 70 A 54 54 0 0 1 120 70" fill="none" stroke={c} strokeWidth="10" strokeLinecap="round" strokeDasharray={`${(v/100)*170} 170`} style={{ transition:"all 1.5s cubic-bezier(.25,.46,.45,.94)" }}/>
          <line x1="66" y1="70" x2="66" y2="22" stroke={c} strokeWidth="2.5" strokeLinecap="round" transform={`rotate(${ang},66,70)`} style={{ transition:"transform 1.5s cubic-bezier(.25,.46,.45,.94)" }}/>
          <circle cx="66" cy="70" r="4" fill={c} style={{ filter:`drop-shadow(0 0 6px ${c}55)` }}/>
          <text x="66" y="62" textAnchor="middle" fill="#d0dce8" fontSize="16" fontWeight="700" fontFamily="'JetBrains Mono',monospace">{Math.round(v)}</text>
        </svg>
        <div style={{ color:c, fontSize:12, fontWeight:700, letterSpacing:1.5, marginTop:-2 }}>{t}</div>
      </div>);
    }

    // ══════════ APP ══════════
    function App() {
      const [data, setData] = useState(null);
      const [ts, setTs] = useState(null);
      const [loading, setLoading] = useState(true);
      const [fetching, setFetching] = useState(false);
      const [cat, setCat] = useState("all");
      const [exp, setExp] = useState(null);
      const [sk, setSk] = useState(null);
      const [sd, setSd] = useState("desc");
      const [apiOk, setApiOk] = useState(false);

      const refresh = useCallback(async () => {
        setFetching(true);
        const d = await loadAll();
        setData(d);
        setTs(new Date());
        setApiOk(Object.values(d).some(x => x.src === "Twelve Data"));
        setLoading(false);
        setFetching(false);
      }, []);

      useEffect(() => { refresh(); }, [refresh]);

      if (loading || !data) return (
        <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16 }}>
          <div style={{ width:40, height:40, border:"3px solid #14263a", borderTop:"3px solid #4FC3F7", borderRadius:"50%", animation:"spin .8s linear infinite" }}/>
          <div style={{ color:"#2e4458", fontSize:14 }}>正在載入每日收盤數據...</div>
        </div>
      );

      const risk = (() => {
        const sp=(data.us10y?.price||4.34)-(data.us2y?.price||3.95);
        const oilShock=(data.wti?.price||116)>100?20:(data.wti?.price||0)>80?10:0;
        const goldSafe=(data.gold?.price||4670)>4500?12:0;
        const oilVol=Math.abs(data.wti?.changePct||0)+Math.abs(data.brent?.changePct||0);
        const yH=(data.us10y?.price||4.34)>4.5?10:0;
        const sR=sp<0?25:sp<.3?12:0;
        return Math.min(98,Math.max(10,20+sR+oilVol*2+oilShock+goldSafe+yH));
      })();
      const spread=(data.us10y?.price||4.34)-(data.us2y?.price||3.95);
      const fmtP=(inst,v)=>v.toFixed(inst.bond?3:(v<10?2:(v<200?2:0)));
      const list=INSTRUMENTS.filter(i=>cat==="all"||i.cat===cat);
      const sorted=[...list].sort((a,b)=>{ if(!sk)return 0; const va=sk==="name"?a.name:sk==="price"?data[a.id]?.price:data[a.id]?.changePct; const vb=sk==="name"?b.name:sk==="price"?data[b.id]?.price:data[b.id]?.changePct; if(typeof va==="string") return sd==="asc"?va.localeCompare(vb):vb.localeCompare(va); return sd==="asc"?(va||0)-(vb||0):(vb||0)-(va||0); });
      const doSort=k=>{ if(sk===k) setSd(d=>d==="asc"?"desc":"asc"); else{setSk(k);setSd("desc");} };
      const eInst=exp?INSTRUMENTS.find(i=>i.id===exp):null;
      const dataDate=data.gold?.date||data.us10y?.date||"—";

      return (
        <div style={{ padding:"20px 12px", maxWidth:1200, margin:"0 auto" }}>
          {exp&&eInst&&<Detail inst={eInst} d={data[exp]} onClose={()=>setExp(null)}/>}

          {/* Header */}
          <div style={{ marginBottom:18 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:10 }}>
              <div>
                <h1 style={{ fontSize:23, fontWeight:800, color:"#dce6f0", margin:0, letterSpacing:"-.4px" }}><span style={{ color:"#4FC3F7", marginRight:8, fontSize:20 }}>◈</span>全球原物料 & 債券殖利率</h1>
                <div style={{ fontSize:10, color:"#1e3448", marginTop:4, letterSpacing:2.5, fontWeight:700 }}>DAILY RISK DASHBOARD · LONG-TERM INVESTOR EDITION</div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <div className="mono" style={{ background:"#081018", borderRadius:10, padding:"5px 12px", fontSize:10, color:"#2e4458", border:"1px solid #10202e", display:"flex", alignItems:"center", gap:7 }}>
                  <span style={{ width:7, height:7, borderRadius:"50%", background:apiOk?"#10b981":"#eab308", boxShadow:`0 0 10px ${apiOk?"#10b981":"#eab308"}44` }}/>
                  收盤日：{dataDate}
                </div>
                <button onClick={refresh} disabled={fetching} style={{ background:fetching?"#060e18":"linear-gradient(135deg,#0e1a28,#081420)", border:"1px solid #10202e", borderRadius:10, padding:"5px 14px", color:fetching?"#1e3448":"#4FC3F7", fontSize:12, fontWeight:600, cursor:fetching?"default":"pointer", fontFamily:"'Outfit',sans-serif" }}>
                  {fetching?"⏳ 載入中":"⟳ 更新數據"}
                </button>
              </div>
            </div>
            {!apiOk && (
              <div style={{ marginTop:10, background:"#eab30808", border:"1px solid #eab30818", borderRadius:10, padding:"8px 14px", fontSize:11, color:"#a68920", display:"flex", alignItems:"center", gap:8, lineHeight:1.6 }}>
                ⚠️ API 連線失敗，目前顯示 4/7 基準價。請確認 API Key 是否正確。
              </div>
            )}
          </div>

          {/* Risk Panel */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(230px,1fr))", gap:10, marginBottom:14 }}>
            <div style={{ background:"linear-gradient(150deg,#081420,#060e18)", borderRadius:16, padding:"16px 14px", border:"1px solid #0e1e2e" }}>
              <div style={{ fontSize:9, color:"#1e3448", fontWeight:700, letterSpacing:2.5, marginBottom:6 }}>COMPOSITE RISK INDEX</div>
              <Gauge value={risk}/>
            </div>
            <div style={{ background:"linear-gradient(150deg,#081420,#060e18)", borderRadius:16, padding:"16px 20px", border:"1px solid #0e1e2e", display:"flex", flexDirection:"column", justifyContent:"center", gap:10 }}>
              <div style={{ fontSize:9, color:"#1e3448", fontWeight:700, letterSpacing:2.5 }}>YIELD SPREAD · 10Y − 2Y</div>
              <div className="mono" style={{ fontSize:34, fontWeight:800, color:spread<0?"#ef4444":spread<.3?"#eab308":"#10b981", lineHeight:1 }}>{spread>=0?"+":""}{spread.toFixed(3)}<span style={{ fontSize:14, opacity:.5 }}>%</span></div>
              <div style={{ fontSize:11, color:"#2e4458" }}>{spread<0?"⚠️ 殖利率曲線倒掛 — 衰退風險升高":spread<.3?"⚡ 利差偏窄 — 需密切關注":"✓ 曲線正常 — 利差健康"}</div>
            </div>
            <div style={{ background:"linear-gradient(150deg,#081420,#060e18)", borderRadius:16, padding:"16px 20px", border:"1px solid #0e1e2e", display:"flex", flexDirection:"column", justifyContent:"center", gap:7 }}>
              <div style={{ fontSize:9, color:"#1e3448", fontWeight:700, letterSpacing:2.5, marginBottom:2 }}>KEY INDICATORS</div>
              {[{ l:"黃金",id:"gold",p:"$",s:"",d:0 },{ l:"WTI原油",id:"wti",p:"$",s:"",d:0 },{ l:"10Y殖利率",id:"us10y",p:"",s:"%",d:3 }].map(x=>{
                const dd=data[x.id]; if(!dd)return null; const u=dd.changePct>=0;
                return(<div key={x.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ fontSize:12, color:"#3a5068" }}>{x.l}</span>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <span className="mono" style={{ fontSize:14, fontWeight:700, color:"#d0dce8" }}>{x.p}{dd.price.toFixed(x.d)}{x.s}</span>
                    <span className="mono" style={{ fontSize:11, fontWeight:600, color:u?"#10b981":"#ef4444", minWidth:56, textAlign:"right" }}>{u?"▲":"▼"}{Math.abs(dd.changePct).toFixed(2)}%</span>
                  </div>
                </div>);
              })}
            </div>
          </div>

          {/* Tabs */}
          <div style={{ display:"flex", gap:5, flexWrap:"wrap", marginBottom:10 }}>
            {["all","metals","energy","bonds"].map(c2=>{
              const ac=cat===c2, col=c2==="all"?"#4FC3F7":CAT_COL[c2];
              return(<button key={c2} onClick={()=>setCat(c2)} style={{ background:ac?`${col}12`:"transparent", border:`1px solid ${ac?`${col}30`:"#0e1e2e"}`, borderRadius:10, padding:"5px 14px", color:ac?col:"#1e3448", fontSize:11, fontWeight:700, cursor:"pointer", letterSpacing:.5, fontFamily:"'Outfit','Noto Sans TC',sans-serif" }}>{c2==="all"?"全部":CAT_LABEL[c2]}</button>);
            })}
          </div>

          {/* Table */}
          <div style={{ background:"linear-gradient(155deg,#071018,#050c14)", borderRadius:16, border:"1px solid #0e1e2e", overflow:"hidden" }}>
            <div style={{ overflowX:"auto" }}>
              <table style={{ width:"100%", borderCollapse:"collapse", minWidth:900 }}>
                <thead><tr style={{ borderBottom:"1px solid #0e1e2e" }}>
                  {[{ k:"name",l:"商品",a:"left" },{ k:"price",l:"收盤價",a:"right" },{ k:"changePct",l:"日漲跌",a:"right" },{ k:null,l:"30日區間",a:"right" },{ k:null,l:"30 日走勢",a:"center",w:"250px" }].map((c3,i)=>(
                    <th key={i} onClick={()=>c3.k&&doSort(c3.k)} style={{ padding:"11px 14px", fontSize:9, fontWeight:700, color:"#1e3448", textAlign:c3.a, letterSpacing:2, cursor:c3.k?"pointer":"default", userSelect:"none", whiteSpace:"nowrap", width:c3.w||"auto", textTransform:"uppercase" }}>
                      {c3.l}{sk===c3.k&&<span style={{ marginLeft:4, color:"#4FC3F7" }}>{sd==="asc"?"↑":"↓"}</span>}
                    </th>
                  ))}
                </tr></thead>
                <tbody>
                  {sorted.map((inst,idx)=>{
                    const d=data[inst.id]; if(!d)return null; const up=d.changePct>=0;
                    return(
                      <tr key={inst.id} onClick={()=>setExp(inst.id)} className="row-hover" style={{ borderBottom:idx<sorted.length-1?"1px solid #0a1620":"none", cursor:"pointer", transition:"background .15s" }}>
                        <td style={{ padding:"10px 14px" }}>
                          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                            <span style={{ fontSize:20 }}>{inst.icon}</span>
                            <div>
                              <div style={{ fontSize:13, fontWeight:700, color:"#c8d8e8" }}>{inst.name}</div>
                              <div style={{ fontSize:10, color:CAT_COL[inst.cat], fontWeight:500, opacity:.7 }}>{inst.sym} · {inst.unit}</div>
                            </div>
                          </div>
                        </td>
                        <td className="mono" style={{ padding:"10px 14px", textAlign:"right", fontSize:15, fontWeight:700, color:"#dce6f0" }}>
                          {inst.bond?"":"$"}{fmtP(inst,d.price)}{inst.bond&&<span style={{ fontSize:11, color:"#2e4458", marginLeft:1 }}>%</span>}
                        </td>
                        <td style={{ padding:"10px 14px", textAlign:"right" }}>
                          <span className="mono" style={{ display:"inline-flex", alignItems:"center", gap:3, background:up?"#10b98110":"#ef444410", border:`1px solid ${up?"#10b98118":"#ef444418"}`, borderRadius:8, padding:"4px 10px", fontSize:12, fontWeight:700, color:up?"#10b981":"#ef4444" }}>
                            {up?"▲":"▼"} {Math.abs(d.changePct).toFixed(2)}%
                          </span>
                          <div className="mono" style={{ fontSize:10, color:up?"#10b98155":"#ef444455", marginTop:3 }}>{up?"+":""}{d.change.toFixed(inst.bond?3:2)}</div>
                        </td>
                        <td className="mono" style={{ padding:"10px 14px", textAlign:"right", fontSize:11 }}>
                          <span style={{ color:"#10b981" }}>{fmtP(inst,d.high30)}</span><span style={{ margin:"0 5px", color:"#14223a" }}>—</span><span style={{ color:"#ef4444" }}>{fmtP(inst,d.low30)}</span>
                        </td>
                        <td style={{ padding:"6px 10px", width:250 }}><div style={{ height:72 }}><Spark data={d.history} id={inst.id} h={72}/></div></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>

          {/* Footer */}
          <div style={{ marginTop:14, fontSize:10, color:"#14263a", lineHeight:1.8 }}>
            <div style={{ display:"flex", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
              <span>{apiOk ? "數據源：Twelve Data API 每日收盤價（interval=1day）" : "數據源：2026/4/7 驗證基準價"} · 點擊任一列展開 30 日圖表</span>
              <span>每日開啟時自動載入 · 手動點擊「更新數據」刷新</span>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
